name: Shutify Android CI

on:
  push:
    branches:
      - GOGO
  pull_request:
    branches:
      - GOGO

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all possible APKs
        run: |
          # Tente toutes les tâches de build possibles pour produire des APKs
          ./gradlew :app:assembleRelease || true
          ./gradlew :app:assembleDebug || true
          ./gradlew :app:assembleUniversalRelease || true

      - name: List APK outputs for debug
        run: ls -R app/build/outputs/apk || echo "No APKs found yet"

      - name: Find all APKs and Mapping files
        id: find_outputs
        run: |
          APKS=$(find app/build/outputs/apk -type f -name "*.apk")
          MAPPINGS=$(find app/build/outputs/mapping -type f -name "*.txt")
          if [ -z "$APKS" ]; then
            echo "No APKs found! Build probably failed."
            exit 1
          fi
          echo "APKS=$APKS" >> $GITHUB_ENV
          echo "MAPPINGS=$MAPPINGS" >> $GITHUB_ENV
          echo "Found APKs:"
          echo "$APKS"
          echo "Found Mappings:"
          echo "$MAPPINGS"

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shutify-ci-release
          path: |
            ${{ env.APKS }}
            ${{ env.MAPPINGS }}

      - name: Create GitHub Release with all APKs
        run: |
          GIT_DESCRIBE=$(git rev-parse --short HEAD)
          # On essaie de récupérer versionName, fallback à "unknown"
          VERSION=$(grep 'versionName = ' app/build.gradle || echo "versionName = \"unknown\"" | sed 's/.*versionName = "\(.*\)".*/\1/')
          
          RELEASE_APKS=""
          for apk in $APKS; do
            BASENAME=$(basename "$apk")
            NEWNAME="Shutify-${BASENAME%.apk}-v${VERSION}-${GIT_DESCRIBE}.apk"
            mv "$apk" "$NEWNAME"
            RELEASE_APKS="$RELEASE_APKS $NEWNAME"
          done

          # Supprimer l’ancienne release si elle existe
          gh release delete autobuild --yes || true

          # Créer une nouvelle release avec tous les APKs
          gh release create autobuild $RELEASE_APKS --latest --title "Shutify v${VERSION} (${GIT_DESCRIBE})" --notes "Auto build by GitHub Actions"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
