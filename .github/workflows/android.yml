name: Android CI

on:
  push:
    branches:
      - GOGO
  pull_request:
    branches:
      - GOGO

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: chmod +x gradlew 
      run: ./gradlew assembleRelease
       
 - name: Upload Release Artifact
    uses: actions/upload-artifact@v4
    with:
      name: shushify-ci-release-apk
      path: |
        app/build/outputs/apk/release
        app/build/outputs/mapping/release/mapping.txt

  - name: Create AutoBuild Release
    run: |
      GIT_DESCRIBE=$(git rev-parse --short HEAD)
      VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
      cd app/build/outputs/apk/release/
      mv app-release.apk Shushify-v${VERSION}.apk
      gh release delete autobuild --yes || true
      gh release create autobuild Shushify-v${VERSION}.apk --latest --title "Shushify v${VERSION} (${GIT_DESCRIBE})" --notes "This is an auto build by Github Android CI"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
