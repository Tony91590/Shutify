name: Android CI

on:
  push:
    branches: [ "Fuck" ]
    tags-ignore:
      - 'v*'          # tagged releases are handled by release.yml
  pull_request:
    branches: [ "Fuck" ]
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release
      # Fixed seed → stable package name across builds (allows direct updates without reinstall)
      run: ./gradlew assembleUniversalRelease -PPACKAGE_NAME_SEED=1337

    - name: Upload a Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: shushify-ci-release-apk
        path: |
          app/build/outputs/apk/universal/release
          app/build/outputs/mapping/universalRelease/mapping.txt

    - name: Create AutoBuild Release
      run: |
        GIT_DESCRIBE=$(git rev-parse --short HEAD)
        VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)".*/\1/')
        cd app/build/outputs/apk/universal/release/
        mv app-universal-release.apk Shushify-v${VERSION}.apk
        gh release delete autobuild --yes || true
        gh release create autobuild Shushify-v${VERSION}.apk --latest --title "Shushify v${VERSION} (${GIT_DESCRIBE})" --notes "This is an auto build by Github Android CI"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
