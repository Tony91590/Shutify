name: Android CI Full

on:
  push:
    branches:
      - GOGO
  pull_request:
    branches:
      - GOGO

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        run: |
          # Build main release and universal if exists
          ./gradlew assembleRelease || true
          ./gradlew assembleUniversalRelease || true

      - name: List APKs for debug
        run: ls -R app/build/outputs/apk || echo "No APKs found yet"

      - name: Find all APKs and Mapping files
        id: find_outputs
        run: |
          # Detect all APKs and mapping.txt
          APKS=$(find app/build/outputs/apk -type f -name "*.apk")
          MAPPINGS=$(find app/build/outputs/mapping -type f -name "*.txt")
          if [ -z "$APKS" ]; then
            echo "No APKs found!"
            exit 1
          fi
          echo "APKS=$APKS" >> $GITHUB_ENV
          echo "MAPPINGS=$MAPPINGS" >> $GITHUB_ENV
          echo "Found APKs:"
          echo "$APKS"
          echo "Found Mappings:"
          echo "$MAPPINGS"

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shushify-ci-release
          path: |
            ${{ env.APKS }}
            ${{ env.MAPPINGS }}

      - name: Create GitHub Release with all APKs
        run: |
          GIT_DESCRIBE=$(git rev-parse --short HEAD)
          VERSION=$(grep 'versionName = ' app/build.gradle | sed 's/.*versionName = "\(.*\)".*/\1/')
          
          # Renommer et collecter les APKs pour la release
          RELEASE_APKS=""
          for apk in $APKS; do
            BASENAME=$(basename "$apk")
            NEWNAME="Shushify-${BASENAME%.apk}-v${VERSION}-${GIT_DESCRIBE}.apk"
            mv "$apk" "$NEWNAME"
            RELEASE_APKS="$RELEASE_APKS $NEWNAME"
          done

          # Supprimer l’ancienne release si elle existe
          gh release delete autobuild --yes || true
          
          # Créer une nouvelle release avec tous les APKs
          gh release create autobuild $RELEASE_APKS --latest --title "Shushify v${VERSION} (${GIT_DESCRIBE})" --notes "Auto build by GitHub Actions"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
